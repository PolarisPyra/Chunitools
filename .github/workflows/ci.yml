name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**", "**.md"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --group dev
      - run: uv run ruff check src/ scripts/ build.py

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --group dev
      - run: uv run basedpyright src/

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --group dev
      - name: Build executable
        run: python3 build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunitools-linux
          path: builds/chunitools_linux.tar.gz
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libegl1 libxkbcommon0 libfontconfig1 2>/dev/null || true
      - run: uv sync --group dev
      - name: Download vgmstream-cli (for audio tests)
        run: python3 scripts/download_vgmstream.py linux
      - name: Run tests
        run: |
          uv run pytest -q --tb=short \
            --ignore=tests/test_window_editor.py \
            --ignore=tests/test_play_view_3d_geometry.py \
            --ignore=tests/test_export.py \
            --ignore=tests/test_option_export.py \
            --ignore=tests/test_bootstrap.py \
            --ignore=tests/test_export_cli.py \
            --ignore=tests/test_toolbar_icons.py \
            -k "not test_music_player_routes_mp3_to_vgmstream_backend" \
            2>&1 | tail -5
