name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libxkbcommon0 libfontconfig1
      - run: uv sync
      - run: python3 scripts/download_vgmstream.py linux
      - run: uv run pyinstaller --noconfirm chunitools.spec
      - run: |
          mkdir -p chunitools_linux
          cp dist/chunitools chunitools_linux/
          tar czf chunitools_linux.tar.gz chunitools_linux/
      - uses: actions/upload-artifact@v4
        with:
          name: chunitools_linux
          path: chunitools_linux.tar.gz
          if-no-files-found: error

  build-macos-arm64:
    name: macOS Apple Silicon
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: brew install libxml2 2>/dev/null || true
      - run: uv sync
      - run: python3 scripts/download_vgmstream.py macos
      - run: uv run pyinstaller --noconfirm chunitools.spec
      - run: |
          mkdir -p chunitools_macos_arm64
          cp dist/chunitools chunitools_macos_arm64/
          tar czf chunitools_macos_arm64.tar.gz chunitools_macos_arm64/
      - uses: actions/upload-artifact@v4
        with:
          name: chunitools_macos_arm64
          path: chunitools_macos_arm64.tar.gz
          if-no-files-found: error

  build-macos-x86_64:
    name: macOS Intel
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install universal2 Python from python.org
        run: |
          curl -sL -o /tmp/python.pkg "https://www.python.org/ftp/python/3.13.13/python-3.13.13-macos11.pkg"
          sudo installer -pkg /tmp/python.pkg -target /
          rm /tmp/python.pkg
          PY_BIN="/Library/Frameworks/Python.framework/Versions/3.13/bin"
          echo "$PY_BIN" >> "$GITHUB_PATH"

      - name: Verify Python runs under x86_64
        run: |
          arch -x86_64 python3 -c "import platform; print('arch:', platform.machine())"

      - run: brew install libxml2 2>/dev/null || true

      - name: Create x86_64 venv and install deps (pip)
        run: |
          arch -x86_64 python3 -m venv venv_x86
          source venv_x86/bin/activate
          pip install --upgrade pip
          pip install pyinstaller PySide6 Pillow qtawesome pyflac platformdirs PyCriCodecsEx

      - run: python3 scripts/download_vgmstream.py macos

      - name: Build with PyInstaller (x86_64)
        run: |
          source venv_x86/bin/activate
          arch -x86_64 python3 -m PyInstaller --noconfirm chunitools.spec

      - run: |
          mkdir -p chunitools_macos_x86_64
          cp dist/chunitools chunitools_macos_x86_64/
          tar czf chunitools_macos_x86_64.tar.gz chunitools_macos_x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: chunitools_macos_x86_64
          path: chunitools_macos_x86_64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync
      - run: python3 scripts/download_vgmstream.py windows
      - run: uv run pyinstaller --noconfirm chunitools.spec
      - run: |
          New-Item -ItemType Directory -Force -Path chunitools_windows
          Copy-Item dist/chunitools.exe -Destination chunitools_windows/
          Compress-Archive -Path chunitools_windows -DestinationPath chunitools_windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: chunitools_windows
          path: chunitools_windows.zip
          if-no-files-found: error

  release:
    needs: [build-linux, build-macos-arm64, build-macos-x86_64, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: chunitools_*
          merge-multiple: true
      - run: ls -lh
      - uses: softprops/action-gh-release@v2
        with:
          name: chunitools ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            chunitools_linux.tar.gz
            chunitools_macos_x86_64.tar.gz
            chunitools_macos_arm64.tar.gz
            chunitools_windows.zip
