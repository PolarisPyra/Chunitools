name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libxkbcommon0 libfontconfig1
      - run: uv sync
      - run: python3 scripts/download_vgmstream.py linux
      - run: uv run pyinstaller --noconfirm chunitools.spec
      - run: |
          mkdir -p chunitools_linux
          cp dist/chunitools chunitools_linux/
          tar czf chunitools_linux.tar.gz chunitools_linux/
      - uses: actions/upload-artifact@v4
        with:
          name: chunitools_linux
          path: chunitools_linux.tar.gz
          if-no-files-found: error

  build-macos-arm64:
    name: macOS Apple Silicon
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: brew install libxml2 2>/dev/null || true
      - run: uv sync
      - run: python3 scripts/download_vgmstream.py macos
      - run: uv run pyinstaller --noconfirm chunitools.spec
      - run: |
          mkdir -p chunitools_macos_arm64
          cp dist/chunitools chunitools_macos_arm64/
          tar czf chunitools_macos_arm64.tar.gz chunitools_macos_arm64/
      - uses: actions/upload-artifact@v4
        with:
          name: chunitools_macos_arm64
          path: chunitools_macos_arm64.tar.gz
          if-no-files-found: error

  build-macos-x86_64:
    name: macOS Intel
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x86_64
      - run: brew install libxml2 2>/dev/null || true
      - name: Install deps (pip, not uv — uv is ARM64-only)
        run: |
          pip install --upgrade pip
          pip install pyinstaller PySide6 Pillow qtawesome pyflac platformdirs PyCriCodecsEx tomli
      - run: python3 scripts/download_vgmstream.py macos
      - name: Build with PyInstaller (x86_64 Python)
        run: python3 -m PyInstaller --noconfirm chunitools.spec
      - run: |
          mkdir -p chunitools_macos_x86_64
          cp dist/chunitools chunitools_macos_x86_64/
          tar czf chunitools_macos_x86_64.tar.gz chunitools_macos_x86_64/
      - uses: actions/upload-artifact@v4
        with:
          name: chunitools_macos_x86_64
          path: chunitools_macos_x86_64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync
      - run: python3 scripts/download_vgmstream.py windows
      - run: uv run pyinstaller --noconfirm chunitools.spec
      - run: |
          New-Item -ItemType Directory -Force -Path chunitools_windows
          Copy-Item dist/chunitools.exe -Destination chunitools_windows/
          Compress-Archive -Path chunitools_windows -DestinationPath chunitools_windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: chunitools_windows
          path: chunitools_windows.zip
          if-no-files-found: error

  release:
    needs: [build-linux, build-macos-arm64, build-macos-x86_64, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: chunitools_*
          merge-multiple: true
      - run: ls -lh
      - uses: softprops/action-gh-release@v2
        with:
          name: chunitools ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            chunitools_linux.tar.gz
            chunitools_macos_x86_64.tar.gz
            chunitools_macos_arm64.tar.gz
            chunitools_windows.zip
